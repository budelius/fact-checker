services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    expose:
      - "27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-factchecker}
      MONGODB_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-factchecker-dev-password}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  mongodb_data:
  mongodb_config:
  qdrant_storage:
